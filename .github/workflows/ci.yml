name: CI

on:
  pull_request:
    paths-ignore:
      - README.md
      - LICENSE
      - NOTICE.md
      - .devcontainer/**
      - benchmarks/**
      - docs/**
      - templates/**
      - samples/**
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE.md
      - "*.sln"
      - "**/*.sln"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # A 10.x SDK is required to compile net10.0; install 8.x too so net8.0 tests
      # have the runtime and targeting pack available.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore Liaison.Messaging.sln

      - name: Build
        run: dotnet build Liaison.Messaging.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Liaison.Messaging.sln --configuration Release --no-build
